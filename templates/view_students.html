{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">
    🎓 Student Records
</h1>

<div class="card shadow">

    <div class="card-body">

        <form method="GET" action="/students" class="mb-4">

            <div class="row">

                <div class="col-md-10">

                    <input
                        type="text"
                        name="search"
                        class="form-control"
                        placeholder="Search Student By Name">

                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">
                        Search
                    </button>

                </div>

            </div>

        </form>

        <div class="mb-3">

            <a href="/add" class="btn btn-success">
                ➕ Add Student
            </a>

            <a href="/" class="btn btn-secondary">
                🏠 Home
            </a>

        </div>

        <table class="table table-bordered table-striped table-hover">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                {% for student in students %}

                <tr>

                    <td>{{ student[0] }}</td>
                    <td>{{ student[1] }}</td>
                    <td>{{ student[2] }}</td>
                    <td>{{ student[3] }}</td>
                    <td>{{ student[4] }}</td>

                    <td>

                        <a href="/update/{{ student[0] }}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/delete/{{ student[0] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this student?')">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
