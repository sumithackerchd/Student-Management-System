<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Add Student</h2>

    <form method="POST">

        <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name">

        <input type="text" name="course" class="form-control mb-3" placeholder="Enter Course">

        <input type="text" name="mobile" class="form-control mb-3" placeholder="Enter Mobile">

        <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email">

        <button class="btn btn-success">Save Student</button>

    </form>

</div>

</body>
</html>
