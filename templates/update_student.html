{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning">

        <h3 class="mb-0">
            ✏️ Update Student
        </h3>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Student Name
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ student[1] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Course
                </label>

                <input
                    type="text"
                    name="course"
                    class="form-control"
                    value="{{ student[2] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Mobile
                </label>

                <input
                    type="text"
                    name="mobile"
                    class="form-control"
                    value="{{ student[3] }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ student[4] }}"
                    required>

            </div>

            <button type="submit" class="btn btn-success">
                💾 Update Student
            </button>

            <a href="/students" class="btn btn-secondary">
                🔙 Back
            </a>

        </form>

    </div>

</div>

{% endblock %}
